{% extends 'base.html' %}

{% block title %}Регистрация | V-Tracker{% endblock %}

{% block extra_head %}
<style>
    /* Django рендерит форму через <p>. Делаем их аккуратными */
    #register-form p { text-align: left; margin-bottom: 15px; }
    #register-form label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    
    /* Стили для подсказок и ошибок, которые генерирует Django */
    .helptext { font-size: 0.8rem; color: var(--text-muted); display: block; margin-top: 5px; }
    .errorlist { color: var(--danger); list-style: none; padding: 0; margin: 5px 0 10px 0; font-size: 0.85rem; }
</style>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto; padding: 30px 20px; text-align: center;">
    <h2 style="margin-top: 0; margin-bottom: 20px;">Регистрация</h2>
    
    <form method="post" id="register-form">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px; font-size: 1.1rem; padding: 12px;">Создать аккаунт</button>
        
        <p style="margin-top: 20px; font-size: 0.95rem; color: var(--text-muted);">
            Уже есть аккаунт? <a href="{% url 'login' %}" style="font-weight: bold;">Войти</a>
        </p>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Применяем классы base.html к инпутам Django-формы
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll("#register-form input");
        inputs.forEach(input => {
            if (input.type !== "hidden" && input.type !== "submit" && input.type !== "checkbox") {
                input.classList.add("form-control");
            }
        });
    });
</script>
{% endblock %}
