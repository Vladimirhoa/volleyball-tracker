{% extends 'base.html' %}

{% block title %}Вход | V-Tracker{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto; padding: 30px 20px; text-align: center;">
    <h2 style="margin-top: 0; margin-bottom: 20px;">Вход в Дневник</h2>
    
    {% if form.errors %}
        <div style="color: var(--danger); margin-bottom: 15px; font-weight: 500;">
            Неверный логин или пароль.
        </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}" id="login-form">
        {% csrf_token %}
        
        <div class="form-group" style="text-align: left;">
            <input type="text" name="username" placeholder="Имя пользователя" required autofocus>
        </div>
        
        <div class="form-group" style="text-align: left;">
            <input type="password" name="password" placeholder="Пароль" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; font-size: 1.1rem; padding: 12px;">Войти</button>
        
        <p style="margin-top: 20px; font-size: 0.95rem; color: var(--text-muted);">
            Нет аккаунта? <a href="{% url 'register' %}" style="font-weight: bold;">Зарегистрироваться</a>
        </p>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Применяем классы base.html к инпутам
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll("#login-form input");
        inputs.forEach(input => {
            if (input.type !== "hidden" && input.type !== "submit") {
                input.classList.add("form-control");
            }
        });
    });
</script>
{% endblock %}
