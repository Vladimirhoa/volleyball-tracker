version: '3.8'

services:
  # Добавляем сервис базы данных
  db:
    image: postgres:15-alpine
    container_name: volley_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: volley_redis
    restart: unless-stopped

  volleyball_tracker:
    build: .
    container_name: volleyball_tracker
    restart: unless-stopped
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./data:/app/data
      - ./staticfiles:/app/staticfiles
    environment:
      - DJANGO_DEBUG=False
      # Добавляем переменные для подключения к БД
      - DB_NAME=volley_db
      - DB_USER=volley_user
      - DB_PASSWORD=volley_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - redis
      - db # Указываем зависимость от БД

  celery:
    build: .
    container_name: volley_celery
    restart: unless-stopped
    command: celery -A MyVolleyApp worker --loglevel=info
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./data:/app/data
    environment:
      - DJANGO_DEBUG=False
      - DB_NAME=volley_db
      - DB_USER=volley_user
      - DB_PASSWORD=volley_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - redis
      - db
      - volleyball_tracker

  nginx:
    image: nginx:alpine
    container_name: volley_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./staticfiles:/app/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - volleyball_tracker

  celery_beat:
    build: .
    container_name: volley_celery_beat
    restart: unless-stopped
    command: celery -A MyVolleyApp beat --loglevel=info
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./data:/app/data
    environment:
      - DJANGO_DEBUG=False
      - DB_NAME=volley_db
      - DB_USER=volley_user
      - DB_PASSWORD=volley_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - redis
      - db
      - volleyball_tracker

# Объявляем именованный том для сохранения данных БД
volumes:
  postgres_data: