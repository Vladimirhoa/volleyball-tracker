version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: volley_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Учим базу сообщать о своей готовности
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: volley_redis
    restart: unless-stopped

  volleyball_tracker:
    build: .
    container_name: volleyball_tracker
    restart: unless-stopped
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./data:/app/data
      - ./staticfiles:/app/staticfiles
    environment:
      - DJANGO_DEBUG=False
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      redis:
        condition: service_started
      db:
        # Теперь Django ждет не просто запуска контейнера, а его "здоровья"
        condition: service_healthy

  celery:
    build: .
    container_name: volley_celery
    restart: unless-stopped
    command: celery -A MyVolleyApp worker --loglevel=info
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./data:/app/data
    environment:
      - DJANGO_DEBUG=False
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      volleyball_tracker:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: volley_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./staticfiles:/app/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      volleyball_tracker:
        condition: service_started

  celery_beat:
    build: .
    container_name: volley_celery_beat
    restart: unless-stopped
    command: celery -A MyVolleyApp beat --loglevel=info
    volumes:
      - ${MEDIA_PATH:-./media}:/app/media
      - ./data:/app/data
    environment:
      - DJANGO_DEBUG=False
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      volleyball_tracker:
        condition: service_started

volumes:
  postgres_data: